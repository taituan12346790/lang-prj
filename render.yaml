services:
  # Backend API Service
  - type: web
    name: ai-language-tutor-api
    env: python
    region: singapore
    plan: free
    buildCommand: |
      pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: False
      - key: LOG_LEVEL
        value: INFO
      - key: BACKEND_URL
        value: https://ai-language-tutor-api-brqu.onrender.com
    healthCheckPath: /health
  
  # Frontend Streamlit Service
  - type: web
    name: aitutorlang
    env: python
    region: singapore
    plan: free
    buildCommand: |
      pip install streamlit httpx
    startCommand: streamlit run streamlit_app.py --server.port=$PORT --server.address=0.0.0.0
    envVars:
      - key: API_BASE_URL
        value: https://ai-language-tutor-api-brqu.onrender.com
      - key: BACKEND_URL
        value: https://ai-language-tutor-api-brqu.onrender.com
